<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = { apiKey: "AIzaSyCnO3B_Px9KkQUl79MVq3zcxwoxa3x87XU", 
authDomain: "eco-pneus.firebaseapp.com", projectId: "eco-pneus",
storageBucket: "eco-pneus.firebasestorage.app",
messagingSenderId: "621224107269", 
appId: "1:621224107269:web:13cd1e804ee275621b2b6c" };

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

// 👁 Mostrar senha
document.querySelector(".show-pass").addEventListener("click", function () {
    const senha = document.getElementById("senha");
    senha.type = senha.type === "password" ? "text" : "password";
});

// 🔐 LOGIN COM EMAIL
async function login() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    if (!email || !senha) {
        alert("Preencha os campos!");
        return;
    }

    try {
        await firebase.auth().signInWithEmailAndPassword(email, senha);
        window.location.href = "dashboard.html";
    } catch (error) {
        alert("Erro: " + error.message);
    }
}

// 🔐 LOGIN GOOGLE
async function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();

    try {
        await firebase.auth().signInWithPopup(provider);
        window.location.href = "dashboard.html";
    } catch (error) {
        alert("Erro ao entrar com Google: " + error.message);
    }
}

// 🔒 AUTO LOGIN
firebase.auth().onAuthStateChanged(user => {
    if (user) {
        window.location.href = "dashboard.html";
    }
});
</script>
