<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco Pneus - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="main-container">
    <div class="hero-section">
        <h1>Eco Pneus</h1>
    </div>

    <div class="auth-section">
        <div class="login-card">

            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="senha" placeholder="Senha">

            <button onclick="login()">Entrar</button>

            <button onclick="googleLogin()">Entrar com Google</button>

            <p><a href="cria-conta.html">Criar conta</a></p>

        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = { apiKey: "AIzaSyCnO3B_Px9KkQUl79MVq3zcxwoxa3x87XU", 
authDomain: "eco-pneus.firebaseapp.com", projectId: "eco-pneus",
storageBucket: "eco-pneus.firebasestorage.app",
messagingSenderId: "621224107269", 
appId: "1:621224107269:web:13cd1e804ee275621b2b6c" };

firebase.initializeApp(firebaseConfig);

async function login(){
 const email = email.value;
 const senha = document.getElementById('senha').value;

 await firebase.auth().signInWithEmailAndPassword(email, senha);
 window.location.href = "dashboard.html";
}

async function googleLogin(){
 const provider = new firebase.auth.GoogleAuthProvider();
 await firebase.auth().signInWithPopup(provider);
 window.location.href = "dashboard.html";
}
</script>

</body>
</html>
