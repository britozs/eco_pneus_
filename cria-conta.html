<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Pneus - Criar Conta</title>
    <link rel="icon" href="https://i.postimg.cc/rp5Py0Rr/Eco-Pneus-2-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="cria-conta.css">
</head>
<body>

<div class="signup-page">

    <!-- HEADER -->
    <div class="signup-header">
        <img src="https://i.postimg.cc/rp5Py0Rr/Eco-Pneus-2-removebg-preview.png" alt="Eco Pneus">
        <h1>Crie sua conta</h1>
        <p>Sua jornada sustentavel comeca aqui</p>
    </div>

    <!-- FORM -->
    <div class="signup-form-wrapper">
        <div class="signup-card fade-up">

            <h2>Cadastro</h2>
            <p class="subtitle">Preencha seus dados para comecar</p>

            <!-- TIPO -->
            <div class="tipo-selector">
                <div class="tipo-option active" data-tipo="empresa" onclick="selecionarTipo('empresa')">
                    <span class="tipo-icon">&#127970;</span>
                    Empresa
                </div>
                <div class="tipo-option" data-tipo="pessoa" onclick="selecionarTipo('pessoa')">
                    <span class="tipo-icon">&#128100;</span>
                    Pessoa Fisica
                </div>
            </div>

            <!-- NOME -->
            <div class="form-group">
                <label>Nome completo *</label>
                <input type="text" id="nome" placeholder="Digite seu nome completo">
            </div>

            <!-- EMAIL -->
            <div class="form-group">
                <label>E-mail *</label>
                <input type="email" id="email" placeholder="seu@email.com">
            </div>

            <!-- TELEFONE + CNPJ -->
            <div class="form-row">
                <div class="form-group">
                    <label>Telefone *</label>
                    <input type="tel" id="telefone" placeholder="(11) 99999-0000" oninput="mascaraTelefone(this)">
                </div>
                <div class="form-group" id="cnpj-group">
                    <label id="cnpj-label">CNPJ *</label>
                    <input type="text" id="cnpj" placeholder="00.000.000/0001-00" oninput="mascaraCNPJ(this)">
                </div>
            </div>

            <!-- SENHA -->
            <div class="form-group">
                <label>Senha *</label>
                <input type="password" id="senha" placeholder="Minimo 6 caracteres" oninput="checkPasswordStrength(this.value)">
                <div class="password-strength">
                    <div class="strength-bar"></div>
                    <div class="strength-bar"></div>
                    <div class="strength-bar"></div>
                </div>
            </div>

            <!-- CONFIRMAR SENHA -->
            <div class="form-group">
                <label>Confirmar senha *</label>
                <input type="password" id="confirmar-senha" placeholder="Repita a senha">
            </div>

            <button class="btn-primary" onclick="criarConta()">
                Criar Conta
            </button>

            <div class="divider">ou</div>

            <button class="btn-google" onclick="googleLogin()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Continuar com Google
            </button>

            <p class="terms">
                Ao criar sua conta, voce concorda com nossos<br>
                <a href="#">Termos de Uso</a> e <a href="#">Politica de Privacidade</a>
            </p>

            <p class="auth-footer">
                Ja tem conta? <a href="login.html">Fazer login</a>
            </p>

        </div>
    </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="cria-conta.js"></script>

</body>
</html>
