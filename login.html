<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Pneus - Login</title>
    <link rel="icon" href="https://i.postimg.cc/rp5Py0Rr/Eco-Pneus-2-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/lucide-static@latest/font/lucide.min.css" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-page">

    <!-- HERO -->
    <div class="login-hero">
        <div class="hero-logo">
            <img src="https://i.postimg.cc/rp5Py0Rr/Eco-Pneus-2-removebg-preview.png" alt="Eco Pneus">
        </div>

        <div class="hero-text">
            <h1>Eco <span>Pneus</span></h1>
            <p>Plataforma inteligente de logistica reversa de pneus. Contribua com o meio ambiente de forma simples e eficiente.</p>
        </div>

        <div class="hero-features">
            <div class="hero-feature">
                <div class="icon">&#x267B;</div>
                <span>Coleta sustentavel</span>
            </div>
            <div class="hero-feature">
                <div class="icon">&#x1F4CD;</div>
                <span>Rastreamento em tempo real</span>
            </div>
            <div class="hero-feature">
                <div class="icon">&#x1F4CA;</div>
                <span>Dashboard completo</span>
            </div>
        </div>
    </div>

    <!-- AUTH -->
    <div class="login-auth">
        <div class="login-card fade-up">

            <div class="mobile-logo">
                <img src="https://i.postimg.cc/rp5Py0Rr/Eco-Pneus-2-removebg-preview.png" alt="Eco Pneus">
                <h3>Eco Pneus</h3>
            </div>

            <h2>Bem-vindo de volta</h2>
            <p class="subtitle">Entre na sua conta para continuar</p>

            <div class="form-group">
                <label>E-mail</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="seu@email.com">
                    <i class="icon-mail" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;">&#9993;</i>
                </div>
            </div>

            <div class="form-group">
                <label>Senha</label>
                <div class="input-wrapper">
                    <input type="password" id="senha" placeholder="Digite sua senha">
                    <i style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;">&#128274;</i>
                </div>
            </div>

            <button class="btn-primary" onclick="login()">
                Entrar
            </button>

            <div class="divider">ou</div>

            <button class="btn-google" onclick="googleLogin()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Continuar com Google
            </button>

            <p class="auth-footer">
                Nao tem conta? <a href="cria-conta.html">Criar conta</a>
            </p>

        </div>
    </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="login.js"></script>
<script>
</script>
</body>
</html>
