<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Coleta - Eco Pneus</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#f4f6f9;
}

.header {
    background:#1f7a3a;
    color:white;
    padding:15px;
    font-size:20px;
}

.container {
    padding:20px;
}

.card {
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.btn {
    width:100%;
    padding:15px;
    background:#1f7a3a;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
}

#map {
    height:300px;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="header">Nova Coleta</div>

<div class="container">

<div class="card">
<h3>Escolha o local da coleta</h3>
<div id="map"></div>
</div>

<div class="card">
<h3>Quantidade de pneus</h3>
<input id="qtd" type="number" placeholder="Ex: 50" style="width:100%;padding:10px">
</div>

<button class="btn" onclick="criarColeta()">Confirmar Coleta</button>

<p id="codigo"></p>

</div>

<script>

// 🔥 CONFIG FIREBASE
const firebaseConfig = { apiKey: "AIzaSyCnO3B_Px9KkQUl79MVq3zcxwoxa3x87XU", 
authDomain: "eco-pneus.firebaseapp.com", projectId: "eco-pneus",
storageBucket: "eco-pneus.firebasestorage.app",
messagingSenderId: "621224107269", 
appId: "1:621224107269:web:13cd1e804ee275621b2b6c" };

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.firestore();

let map, marker, lat = -22.90, lng = -47.06;

// 🔐 PROTEÇÃO
auth.onAuthStateChanged(user => {
    if (!user) {
        window.location.href = "index.html";
    }
});

// 🗺️ MAPA
map = L.map('map').setView([lat, lng], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

marker = L.marker([lat, lng]).addTo(map);

map.on('click', function(e){
    lat = e.latlng.lat;
    lng = e.latlng.lng;
    marker.setLatLng(e.latlng);
});

// 🔢 GERAR CÓDIGO
function gerarCodigo() {
    return Math.floor(1000 + Math.random() * 9000); // 4 dígitos
}

// 🚀 CRIAR COLETA
async function criarColeta(){
    const user = auth.currentUser;

    const quantidade = document.getElementById('qtd').value;

    if (!quantidade) {
        alert("Informe a quantidade!");
        return;
    }

    const codigo = gerarCodigo();

    try {
        await db.collection("coletas").add({
            uid: user.uid,
            quantidade: Number(quantidade),
            lat: lat,
            lng: lng,
            codigo: codigo,
            status: "Pendente",
            data: new Date()
        });

        document.getElementById('codigo').innerText =
            "Código da coleta: " + codigo;

        alert("Coleta criada com sucesso!");

    } catch (e) {
        console.error(e);
        alert("Erro ao salvar coleta.");
    }
}

</script>

</body>
</html>
