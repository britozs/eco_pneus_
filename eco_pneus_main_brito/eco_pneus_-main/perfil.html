<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil - Eco Pneus</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f4f6f9;
}

.header {
    background: #0b6b3a;
    color: white;
    padding: 30px 20px 60px;
    border-bottom-left-radius: 30px;
    border-bottom-right-radius: 30px;
}

.top-icons {
    display: flex;
    justify-content: space-between;
}

.icon-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: white;
}

.icon-btn svg {
    width: 28px;
    height: 28px;
}

.profile-info {
    display: flex;
    align-items: center;
    margin-top: 20px;
}

.profile-img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 4px solid white;
    object-fit: cover;
    margin-right: 20px;
}

.profile-text h2 {
    margin: 0;
}

.content {
    margin-top: -40px;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.card {
    background: white;
    border-radius: 15px;
    padding: 15px;
}

@media(max-width: 600px){
    .grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="header">
    <div class="top-icons">
        <button class="icon-btn" onclick="voltar()">
            <i data-lucide="arrow-left"></i>
        </button>

        <button class="icon-btn" onclick="editar()">
            <i data-lucide="settings"></i>
        </button>
    </div>

    <div class="profile-info">
        <img id="foto" class="profile-img" src="https://via.placeholder.com/150">

        <div class="profile-text">
            <h2 id="nome">Carregando...</h2>
            <p id="cnpj">---</p>
            <p id="telefone">---</p>
            <p id="email">---</p>
        </div>
    </div>
</div>

<div class="content">
    <div class="grid">

        <div class="card">
            <h3>Avaliação</h3>
            <p>★★★★★</p>
        </div>

        <div class="card">
            <h3>Materiais</h3>
            <p>Pneus e borracha</p>
        </div>

        <div class="card">
            <h3>Coletas</h3>
            <p>--</p>
        </div>

        <div class="card">
            <h3>Status</h3>
            <p>Empresa verificada</p>
        </div>

    </div>
</div>

<script>
lucide.createIcons();

/* ================= FIREBASE ================= */
const firebaseConfig = { apiKey: "AIzaSyCnO3B_Px9KkQUl79MVq3zcxwoxa3x87XU", 
authDomain: "eco-pneus.firebaseapp.com", projectId: "eco-pneus",
storageBucket: "eco-pneus.firebasestorage.app",
messagingSenderId: "621224107269", 
appId: "1:621224107269:web:13cd1e804ee275621b2b6c" };

// 🔥 EVITA ERRO DE DUPLICAÇÃO
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();

/* ================= AUTH ================= */
auth.onAuthStateChanged(user => {
    if (!user) {
        window.location.href = "index.html";
        return;
    }

    document.getElementById("nome").innerText =
        user.displayName || "Usuário";

    document.getElementById("email").innerText =
        user.email || "Sem email";

    document.getElementById("foto").src =
        user.photoURL || "https://via.placeholder.com/150";

    // Dados temporários
    document.getElementById("cnpj").innerText =
        "00.000.000/0001-00";

    document.getElementById("telefone").innerText =
        "(11) 99999-0000";
});

/* ================= AÇÕES ================= */
function voltar() {
    window.location.href = "dashboard.html";
}

function editar() {
    alert("Editar perfil em breve");
}
</script>

</body>
</html>
