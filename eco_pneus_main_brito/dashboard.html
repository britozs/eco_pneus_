<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Pneus - Dashboard</title>
    <link rel="icon" href="https://i.postimg.cc/rp5Py0Rr/Eco-Pneus-2-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<!-- HEADER -->
<header class="main-header">
    <div class="header-top">
        <div class="header-brand">
            <div class="header-logo">
                <img src="https://i.postimg.cc/Vkf6WnmM/Eco-Pneus-(1).png" alt="Logo">
            </div>
            <div>
                <h1>Eco Pneus</h1>
                <span class="badge">Logistica Reversa</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="btn-notif" title="Notificacoes">
                <i data-lucide="bell"></i>
            </button>
            <button class="icon-btn" onclick="nav('perfil')" title="Perfil">
                <i data-lucide="user"></i>
            </button>
        </div>
    </div>
    <p class="welcome-greeting">Bem-vindo de volta,</p>
    <p class="welcome-name" id="user-name">Carregando...</p>
</header>

<!-- CONTENT -->
<main id="app-content">
    <div class="empty-state fade-in">
        <div class="empty-icon">&#9203;</div>
        <h3>Carregando...</h3>
    </div>
</main>

<!-- MODAL CONTATO -->
<div class="modal-overlay" id="modal-contato" style="display:none;">
    <div class="modal-card">
        <div class="modal-header">
            <h3 id="modal-title">Contato</h3>
            <button class="modal-close" onclick="fecharModal()">&times;</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
    </div>
</div>

<!-- MODAL AVALIAR -->
<div class="modal-overlay" id="modal-avaliar" style="display:none;">
    <div class="modal-card">
        <div class="modal-header">
            <h3>Avaliar Empresa</h3>
            <button class="modal-close" onclick="fecharModalAvaliar()">&times;</button>
        </div>
        <div class="modal-body">
            <p class="modal-subtitle" id="avaliar-nome">Empresa</p>
            <div class="star-selector" id="star-selector">
                <span class="star-select" data-star="1">&#9733;</span>
                <span class="star-select" data-star="2">&#9733;</span>
                <span class="star-select" data-star="3">&#9733;</span>
                <span class="star-select" data-star="4">&#9733;</span>
                <span class="star-select" data-star="5">&#9733;</span>
            </div>
            <textarea id="avaliar-comentario" placeholder="Deixe um comentario (opcional)" rows="3"></textarea>
            <button class="btn-confirm" id="btn-enviar-avaliacao" onclick="enviarAvaliacao()">Enviar Avaliacao</button>
        </div>
    </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <button onclick="nav('dashboard')" class="nav-item active" data-nav="dashboard">
        <i data-lucide="layout-dashboard"></i>
        <span>Inicio</span>
    </button>
    <button onclick="nav('registrar')" class="nav-item" data-nav="registrar">
        <i data-lucide="package-plus"></i>
        <span>Registrar</span>
    </button>
    <button onclick="nav('empresas')" class="nav-item" data-nav="empresas">
        <i data-lucide="building-2"></i>
        <span>Empresas</span>
    </button>
    <button onclick="nav('listar')" class="nav-item" data-nav="listar">
        <i data-lucide="list"></i>
        <span>Coletas</span>
    </button>
    <button onclick="nav('perfil')" class="nav-item" data-nav="perfil">
        <i data-lucide="user"></i>
        <span>Perfil</span>
    </button>
</nav>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
