<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Pneus - Dashboard</title>

    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<!-- Verificação de Login -->
<script>
const token = localStorage.getItem("token");
if (!token) {
    alert("Você precisa fazer login!");
    window.location.href = "index.html";
}
</script>

<header class="main-header">
    <div class="header-content">
        <div class="logo-circle">
            <img src="https://i.postimg.cc/Vkf6WnmM/Eco-Pneus-(1).png" alt="Logo">
        </div>
        <div class="header-text">
            <h1>Eco Pneus</h1>
            <span>Logística Reversa de Pneus</span>
        </div>
    </div>
</header>

<main id="app-content">
    <div class="welcome-section">
        <h2>Bem-vindo ao Sistema</h2>
        <p>Selecione uma opção no menu abaixo.</p>
    </div>
</main>

<nav class="bottom-nav">
    <button onclick="nav('dashboard')" class="nav-item active">
        <i data-lucide="layout-dashboard"></i>
        <span>Início</span>
    </button>
    <button onclick="nav('registrar')" class="nav-item">
        <i data-lucide="package-plus"></i>
        <span>Registrar</span>
    </button>
    <button onclick="nav('listar')" class="nav-item">
        <i data-lucide="list"></i>
        <span>Coletas</span>
    </button>
    <button onclick="nav('perfil')" class="nav-item">
        <i data-lucide="user"></i>
        <span>Perfil</span>
    </button>
</nav>

<script>
lucide.createIcons();

// Navegação entre abas
function nav(aba) {
    const content = document.getElementById("app-content");

    // Remove classe ativa dos botões
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.classList.remove('active');
    });

    // Adiciona a classe ativa ao botão clicado
    event.currentTarget.classList.add('active');

    if (aba === "dashboard") {
        content.innerHTML = `
            <div class="welcome-section">
                <h2>Bem-vindo ao Sistema</h2>
                <p>Gerencie suas coletas de pneus de forma sustentável.</p>
            </div>
        `;
    }

    if (aba === "registrar") {
        content.innerHTML = `
            <div class="form-container">
                <h2>Registrar Coleta</h2>
                <input type="number" id="quantidade" placeholder="Quantidade de Pneus">
                <input type="text" id="endereco" placeholder="Endereço">
                <button onclick="registrarColeta()">Registrar</button>
            </div>
        `;
    }

    if (aba === "listar") {
        listarColetas();
    }

    // Redireciona para a página de perfil
    if (aba === "perfil") {
        window.location.href = "perfil.html";
    }

    lucide.createIcons();
}

// Registrar coleta
async function registrarColeta() {
    const token = localStorage.getItem("token");
    const quantidade = document.getElementById("quantidade").value;
    const endereco = document.getElementById("endereco").value;

    if (!quantidade || !endereco) {
        alert("Preencha todos os campos!");
        return;
    }

    try {
        const res = await fetch("/coleta", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ quantidade, endereco })
        });

        const data = await res.json();

        if (!res.ok) {
            alert(data.msg || "Erro ao registrar coleta.");
            return;
        }

        alert("Coleta registrada com sucesso!");
        nav("listar");
    } catch (error) {
        console.error(error);
        alert("Erro ao conectar com o servidor.");
    }
}

// Listar coletas
async function listarColetas() {
    const token = localStorage.getItem("token");

    try {
        const res = await fetch("/coletas", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        const coletas = await res.json();

        let html = "<h2>Lista de Coletas</h2>";

        if (!coletas.length) {
            html += "<p>Nenhuma coleta registrada.</p>";
        } else {
            html += "<ul>";
            coletas.forEach(c => {
                html += `
                    <li>
                        <strong>${c.quantidade} pneus</strong><br>
                        📍 ${c.endereco}<br>
                        📅 ${c.data}
                    </li>
                `;
            });
            html += "</ul>";
        }

        document.getElementById("app-content").innerHTML = html;
    } catch (error) {
        console.error(error);
        alert("Erro ao carregar coletas.");
    }
}

// Logout (caso queira usar no dashboard)
function logout() {
    localStorage.removeItem("token");
    window.location.href = "index.html";
}
</script>

</body>
</html>
