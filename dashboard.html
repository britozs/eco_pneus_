<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Pneus - Dashboard</title>

    <link rel="stylesheet" href="./css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<header class="main-header">
    <div class="header-content">
        <div class="logo-circle">
            <img src="https://i.postimg.cc/Vkf6WnmM/Eco-Pneus-(1).png" alt="Logo">
        </div>
        <div class="header-text">
            <h1>Eco Pneus</h1>
            <span>Logística Reversa de Pneus</span>
        </div>
    </div>
</header>

<main id="app-content">
    <div class="welcome-section">
        <h2>Carregando...</h2>
    </div>
</main>

<nav class="bottom-nav">
    <button onclick="nav('dashboard')" class="nav-item active">
        <i data-lucide="layout-dashboard"></i>
        <span>Início</span>
    </button>
    <button onclick="nav('registrar')" class="nav-item">
        <i data-lucide="package-plus"></i>
        <span>Registrar</span>
    </button>
    <button onclick="nav('listar')" class="nav-item">
        <i data-lucide="list"></i>
        <span>Coletas</span>
    </button>
    <button onclick="nav('perfil')" class="nav-item">
        <i data-lucide="user"></i>
        <span>Perfil</span>
    </button>
</nav>

<script type="module">

// ================= FIREBASE =================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔑 COLOQUE SUA CONFIG AQUI
const firebaseConfig = { apiKey: "AIzaSyCnO3B_Px9KkQUl79MVq3zcxwoxa3x87XU", 
authDomain: "eco-pneus.firebaseapp.com", projectId: "eco-pneus",
storageBucket: "eco-pneus.firebasestorage.app",
messagingSenderId: "621224107269", 
appId: "1:621224107269:web:13cd1e804ee275621b2b6c" };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ================= AUTH =================
onAuthStateChanged(auth, (user) => {
  if (!user) {
    alert("Você precisa fazer login!");
    window.location.href = "index.html";
  } else {
    nav("dashboard");
  }
});

// ================= NAVEGAÇÃO =================
window.nav = function(aba) {
  const content = document.getElementById("app-content");

  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.classList.remove('active');
  });

  event.currentTarget.classList.add('active');

  if (aba === "dashboard") {
    content.innerHTML = `
      <div class="welcome-section">
        <h2>Bem-vindo ao Eco Pneus</h2>
        <p>Gerencie suas coletas de forma sustentável.</p>
      </div>
    `;
  }

  if (aba === "registrar") {
    content.innerHTML = `
      <div class="form-container">
        <h2>Registrar Coleta</h2>
        <input type="number" id="quantidade" placeholder="Quantidade de Pneus">
        <input type="text" id="endereco" placeholder="Endereço">
        <button onclick="registrarColeta()">Registrar</button>
      </div>
    `;
  }

  if (aba === "listar") {
    listarColetas();
  }

  if (aba === "perfil") {
    window.location.href = "perfil.html";
  }

  lucide.createIcons();
};

// ================= REGISTRAR =================
window.registrarColeta = async function() {
  const user = auth.currentUser;

  const quantidade = document.getElementById("quantidade").value;
  const endereco = document.getElementById("endereco").value;

  if (!quantidade || !endereco) {
    alert("Preencha todos os campos!");
    return;
  }

  try {
    await addDoc(collection(db, "coletas"), {
      uid: user.uid,
      quantidade,
      endereco,
      status: "Pendente",
      data: new Date()
    });

    alert("Coleta registrada!");
    nav("listar");

  } catch (e) {
    console.error(e);
    alert("Erro ao salvar");
  }
};

// ================= LISTAR =================
window.listarColetas = async function() {
  const user = auth.currentUser;

  const q = query(
    collection(db, "coletas"),
    where("uid", "==", user.uid)
  );

  const snapshot = await getDocs(q);

  let html = "<h2>Lista de Coletas</h2>";

  if (snapshot.empty) {
    html += "<p>Nenhuma coleta registrada.</p>";
  } else {
    html += "<ul>";

    snapshot.forEach(doc => {
      const c = doc.data();

      html += `
        <li>
          <strong>${c.quantidade} pneus</strong><br>
          📍 ${c.endereco}<br>
          📅 ${new Date(c.data.seconds * 1000).toLocaleDateString()}
        </li>
      `;
    });

    html += "</ul>";
  }

  document.getElementById("app-content").innerHTML = html;
};

// ================= LOGOUT =================
window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};

// Inicializa ícones
lucide.createIcons();

</script>

</body>
</html>
